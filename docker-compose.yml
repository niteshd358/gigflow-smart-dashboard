version: "3.9"

services:

  backend:
    build: ./backend

    container_name: gigflow_backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    restart: always

  frontend:
    build: ./frontend

    container_name: gigflow_frontend

    ports:
      - "5173:5173"

    env_file:
      - ./frontend/.env

    depends_on:
      - backend

    restart: always